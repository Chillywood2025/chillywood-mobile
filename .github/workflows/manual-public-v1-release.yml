name: Manual Public V1 Android Release

on:
  workflow_dispatch:

jobs:
  public-v1-android-build:
    name: Public V1 Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime config
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BETA_OPERATOR_ALLOWLIST: ${{ secrets.EXPO_PUBLIC_BETA_OPERATOR_ALLOWLIST }}
          EXPO_PUBLIC_BETA_ENVIRONMENT: public-v1
        run: npm run validate:runtime

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android production bundle
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BETA_OPERATOR_ALLOWLIST: ${{ secrets.EXPO_PUBLIC_BETA_OPERATOR_ALLOWLIST }}
          EXPO_PUBLIC_BETA_ENVIRONMENT: public-v1
        run: eas build --platform android --profile production --non-interactive
