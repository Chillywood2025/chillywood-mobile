name: Phase 1 CI - Lint and Typecheck

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Phase 1 Checks / Lint and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck
