name: Phase 3A Manual Preview Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Build platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: string

jobs:
  manual-preview-build:
    name: Manual Preview Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
