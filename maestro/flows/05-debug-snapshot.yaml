appId: host.exp.exponent
---
# Flow 05 — DEV debug panel: overlay activates and Copy Debug Snapshot is reachable
#
# Validates:
#   ✓ DEV badge is rendered on screen (dev builds only — __DEV__ guard)
#   ✓ Long-pressing badge toggles the panel to DEV ON state
#   ✓ Tapping the active badge opens the Runtime Debug panel
#   ✓ "Copy Debug Snapshot" button is visible and tappable
#   ✓ Panel can be closed cleanly

- launchApp:
    clearState: false

# Enter the running Expo app from Expo Go home
- openLink: "exp://127.0.0.1:8081"

# Wait for home to render first
- assertVisible:
    text: "▶ Play"

# ── Activate DEV mode: long-press the badge ───────────────────────────────────
# The badge shows "DEV" when disabled, "DEV ON" when enabled.
# Long-press toggles the enabled state (persisted to AsyncStorage).
# testID="dev-debug-badge" is set on the Pressable for reliable targeting.
- longPressOn:
    id: "dev-debug-badge"

- waitForAnimationToEnd

# Badge label must have flipped to "DEV ON"
- assertVisible:
    text: "DEV ON"

# ── Open the panel: single tap ────────────────────────────────────────────────
- tapOn:
    id: "dev-debug-badge"

- waitForAnimationToEnd

# Panel header must appear
- assertVisible:
    text: "Runtime Debug"

# "Copy Debug Snapshot" button must be present within the panel
- assertVisible:
    text: "Copy Debug Snapshot"

# Tap it — should silently copy to clipboard (no crash)
- tapOn:
    text: "Copy Debug Snapshot"

# Panel must still be open after copy
- assertVisible:
    text: "Runtime Debug"

# ── Close the panel ───────────────────────────────────────────────────────────
- tapOn:
    text: "Close"

- waitForAnimationToEnd

# Panel must be gone; badge must still show "DEV ON"
- assertNotVisible:
    text: "Runtime Debug"

- assertVisible:
    text: "DEV ON"

# ── Teardown: turn DEV mode off to avoid polluting other flows ────────────────
- longPressOn:
    id: "dev-debug-badge"

- assertVisible:
    text: "DEV"
