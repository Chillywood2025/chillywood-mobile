appId: ${MAESTRO_APP_ID}
---
# Flow 09 — Title actions -> self profile likes/shares rails
#
# Validates:
#   ✓ A deterministic title can be liked and copied through the shared content-action layer
#   ✓ Home self-profile entry still opens the canonical profile/channel surface
#   ✓ Self profile rails surface the liked/shared title entries

- launchApp:
    clearState: true

- waitForAnimationToEnd

- runFlow: "_subflows/ensure-authenticated.yaml"

- extendedWaitUntil:
    visible:
      id: "tab-explore-button"
    timeout: 60000

- tapOn:
    id: "tab-explore-button"
    retryTapIfNoChange: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "explore-screen"
    timeout: 60000

- scrollUntilVisible:
    element:
      id: "explore-title-card-chicago-streets"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 100
    centerElement: true

- assertVisible:
    id: "explore-title-card-chicago-streets"

- tapOn:
    id: "explore-title-card-chicago-streets"
    retryTapIfNoChange: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "title-screen"
    timeout: 60000

- assertVisible:
    text: "Chicago Streets"

- runFlow:
    when:
      visible:
        text: "♡ Like"
    commands:
      - tapOn:
          id: "title-like-button"

- runFlow:
    when:
      visible:
        text: "♥ Liked"
    commands:
      - assertVisible:
          id: "title-like-button"

- scrollUntilVisible:
    element:
      id: "title-copy-link-button"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 100
    centerElement: true

- tapOn:
    id: "title-copy-link-button"

- runFlow:
    when:
      visible:
        text: "OK"
    commands:
      - tapOn:
          text: "OK"

- tapOn:
    id: "title-back-button"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "explore-screen"
    timeout: 60000

- tapOn:
    id: "tab-home-button"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 60000

- tapOn:
    id: "home-profile-button"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 60000

- scrollUntilVisible:
    element:
      id: "profile-likes-section"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 100
    centerElement: true

- assertVisible:
    id: "profile-likes-section"

- assertVisible:
    id: "profile-likes-entry-t1"

- scrollUntilVisible:
    element:
      id: "profile-shares-section"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    centerElement: false

- assertVisible:
    id: "profile-shares-section"

- scrollUntilVisible:
    element:
      id: "profile-shares-entry-t1"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    centerElement: false

- assertVisible:
    id: "profile-shares-entry-t1"
