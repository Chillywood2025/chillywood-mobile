appId: ${CHILLYWOOD_APP_ID}
---
# Flow 09 — Optional authenticated self-profile owner rails
#
# Preconditions:
#   ✓ The device is already signed in
#   ✓ SELF_PROFILE_USER_ID matches the authenticated user
#
# Validates:
#   ✓ The canonical self-profile route opens
#   ✓ Self-profile owner rails surface Manage Channel and Chi'lly Chat
#   ✓ Channel Home remains reachable from the owner page

- launchApp:
    clearState: false

- openLink: "${EXPO_URL}"

- openLink: "chillywoodmobile://profile/${SELF_PROFILE_USER_ID}"

- waitForAnimationToEnd

- assertVisible:
    id: "profile-screen"

- assertVisible:
    text: "Manage Channel"

- assertVisible:
    id: "profile-chilly-chat-button"

- tapOn:
    text: "Channel Home"
    retryTapIfNoChange: true

- assertVisible:
    text: "Channel home for live drops, rooms, and creator presence."
