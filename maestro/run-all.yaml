appId: ${CHILLYWOOD_APP_ID}
---
# run-all.yaml — Executes the baseline smoke flows in order.
#
# Run with:
#   cp maestro/.env.example maestro/.env
#   maestro test maestro/run-all.yaml --env EXPO_URL=exp://127.0.0.1:8084
#
# Set a custom app ID (dev build):
#   maestro test maestro/run-all.yaml \
#     --env CHILLYWOOD_APP_ID=com.yourorg.chillywood \
#     --env EXPO_URL=exp://127.0.0.1:8084

- runFlow: "./flows/01-home-opens.yaml"
- runFlow: "./flows/02-tap-title-to-player.yaml"
- runFlow: "./flows/03-player-valid.yaml"
- runFlow: "./flows/04-watch-party-screen.yaml"
- runFlow: "./flows/05-debug-snapshot.yaml"
