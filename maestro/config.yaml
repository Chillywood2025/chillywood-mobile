# Maestro workspace config
# Includes baseline smoke flows plus optional authenticated flows in flows/
flows:
  - "flows/*.yaml"

# ── Environment variables (override via .env or CLI --env flags) ──────────────
#
#  EXPO_URL            – Current Expo session URL for openLink targets.
#                        Example: exp://127.0.0.1:8084
#
#  CHILLYWOOD_APP_ID   – App bundle ID when running against a dev build.
#                        Defaults to Expo Go (host.exp.exponent).
#
#  SELF_PROFILE_USER_ID – Optional: authenticated self-profile id for flow 09.
#
# Override examples:
#   maestro test maestro/run-all.yaml \
#     --env EXPO_URL=exp://127.0.0.1:8084
#
#   maestro test maestro/flows/09-title-actions-to-self-profile-rails.yaml \
#     --env SELF_PROFILE_USER_ID=<profile-user-id>
